name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Node.js dependencies & Build frontend
        run: |
          npm install
          npm run build
        shell: cmd

      - name: Build backend executable
        run: |
          cd backend
          pyinstaller --onefile --noconfirm --name backend --distpath ..\release --hidden-import nanoid --add-data "dist;dist" backend.py
          if exist build rd /s /q build
          if exist backend.spec del backend.spec
        shell: cmd

      - name: Copy env example
        run: |
          if exist .env (
            copy .env release\.env
          ) else (
            copy .env.example release\.env.example
          )
        shell: cmd

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/backend.exe
            release/.env.example
            release/.env
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
