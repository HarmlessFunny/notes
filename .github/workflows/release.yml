name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo y | $env:ANDROID_HOME\cmdline-tools\latest\bin\sdkmanager.bat "ndk;27.0.12077973" "platforms;android-36"

      - name: Install dependencies
        run: npm ci

      - name: Build (exe + APK)
        run: .\build.bat

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Notes-Windows-x64.exe
            release/Notes-Android-arm64-v8a.apk
