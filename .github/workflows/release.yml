name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set CARGO_HOME (same drive as project, avoids cross-drive Kotlin error)
        run: |
          New-Item -ItemType Directory -Force -Path "D:\cargo"
          echo "CARGO_HOME=D:\cargo" >> $env:GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Update version from tag
        shell: pwsh
        run: |
          $ver = "$env:GITHUB_REF_NAME" -replace '^v', ''
          $c = Get-Content src-tauri\tauri.conf.json -Raw | ConvertFrom-Json
          $c.version = $ver
          $c | ConvertTo-Json -Depth 32 | Set-Content src-tauri\tauri.conf.json
          $p = Get-Content package.json -Raw | ConvertFrom-Json
          $p.version = $ver
          $p | ConvertTo-Json -Depth 32 | Set-Content package.json
          (Get-Content src-tauri\Cargo.toml) -replace '^version = ".*"', "version = `"$ver`"" | Set-Content src-tauri\Cargo.toml

      - name: Install dependencies
        run: npm ci

      - name: Build (exe + APK)
        run: .\build.bat

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Notes-Windows-x64.exe
            release/Notes-Android-arm64-v8a.apk
