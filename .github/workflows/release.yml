name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: .\build.bat

      - name: Package
        run: Compress-Archive -LiteralPath release\Notes-Windows-x64 -DestinationPath release\Notes-Windows-x64.zip

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: release\Notes-Windows-x64.zip
