name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set CARGO_HOME (same drive as project, avoids cross-drive Kotlin error)
        run: |
          New-Item -ItemType Directory -Force -Path "D:\cargo"
          echo "CARGO_HOME=D:\cargo" >> $env:GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate keystore for APK signing
        run: |
          keytool -genkey -v -keystore src-tauri\gen\android\app\keystore.jks -alias notes -keyalg RSA -keysize 2048 -validity 10000 -storepass notes123 -keypass notes123 -dname "CN=Notes, OU=Dev, O=Notes, L=City, ST=State, C=CN"

      - name: Install dependencies
        run: npm ci

      - name: Build (exe + APK)
        run: .\build.bat

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Notes-Windows-x64.exe
            release/Notes-Android-arm64-v8a.apk
