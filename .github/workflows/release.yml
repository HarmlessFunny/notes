name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm ci

      - name: Build
        run: .\build.bat

      - name: Package release
        run: |
          Compress-Archive -Path release\backend.exe -DestinationPath Notes-Windows-x64.zip

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: Notes-Windows-x64.zip
